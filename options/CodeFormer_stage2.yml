# general settings
name: CodeFormer_stage2
model_type: CodeFormerIdxModel
num_gpu: 4
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    # name: FFHQ
    # type: FFHQBlindDataset



    # name: MyCustomNoiseDataset
    name: custom_noise_train_dataset
    type: PairedImageDataset
    dataroot_gt: .
    dataroot_lq: .
    meta_info_file: dataset/train_pairs.txt
    filename_tmpl: '{}'


    io_backend:
      type: disk

    in_size: 512
    gt_size: 512
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1

    use_hflip: true
    use_flip: true
    use_rot: False

    use_corrupt: False
    # large degradation in stageII
    # blur_kernel_size: 41
    # use_motion_kernel: false
    # motion_kernel_prob: 0.001
    # kernel_list: ['iso', 'aniso']
    # kernel_prob: [0.5, 0.5]
    # blur_sigma: [1, 15]
    # downsample_range: [4, 30]
    # noise_range: [0, 20]
    # jpeg_range: [30, 80]

    latent_gt_path: ~ # without pre-calculated latent code
    # latent_gt_path: './experiments/pretrained_models/VQGAN/latent_gt_code1024.pth'

    # data loader
    num_worker_per_gpu: 2
    batch_size_per_gpu: 6
    dataset_enlarge_ratio: 50
    prefetch_mode: ~

  val:
    name: custom_noise_val_dataset
    type: PairedImageDataset
    dataroot_gt: .
    dataroot_lq: .
    meta_info_file: dataset/val_pairs.txt
    filename_tmpl: '{}'
    io_backend:
      type: disk
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1
    
# network structures
network_g:
  type: CodeFormer
  dim_embd: 512
  n_head: 8
  n_layers: 9
  codebook_size: 1024
  connect_list: ['32', '64', '128', '256']
  fix_modules: ['quantize','generator']
  vqgan_path: './experiments/pretrained_models/vqgan_code1024.pth' # pretrained VQGAN 

network_vqgan: # this config is needed if no pre-calculated latent
  type: VQAutoEncoder
  img_size: 512
  nf: 64
  ch_mult: [1, 2, 2, 4, 4, 8]
  quantizer: 'nearest'
  codebook_size: 1024

# path
path:
  pretrain_network_g: experiments/pretrained_models/codeformer_stage2.pth
  param_key_g: params_ema
  strict_load_g: true
  pretrain_network_d: ~
  strict_load_d: true
  resume_state: ~

# base_lr(4.5e-6)*bach_size(4)
train:
  use_hq_feat_loss: true
  feat_loss_weight: 1.0
  cross_entropy_loss: true
  entropy_loss_weight: 0.5
  fidelity_weight: 1

  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [400000, 450000]
    gamma: 0.5

  # scheduler:
  #   type: CosineAnnealingRestartLR
  #   periods: [500000]
  #   restart_weights: [1]
  #   eta_min: !!float 2e-5 # no lr reduce in official vqgan code

  total_iter: 20000

  warmup_iter: -1  # no warm up
  ema_decay: 0.995

  use_adaptive_weight: true

  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 0
  manual_seed: 0

# validation settings
val:
  val_freq: !!float 1e2 # no validation
  save_img: true

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29412

find_unused_parameters: true

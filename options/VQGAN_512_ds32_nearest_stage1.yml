# general settings
name: VQGAN_Stage1_Personalized_50
model_type: VQGANModel
num_gpu: 4 # Matches your Stage 2 setup
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: My_GT_Data
    type: FFHQBlindDataset 
    # Use the same GT path from your Stage 2 config
    dataroot_gt: /data1/hs_denoising/codeformer_dataset/codeformer_val/gt_overfit
    filename_tmpl: '{}'
    io_backend:
      type: disk

    in_size: 512
    gt_size: 512
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    use_hflip: true
    use_corrupt: false # Stage 1 must only see clean images

    # data loader
    num_worker_per_gpu: 2
    batch_size_per_gpu: 2 
    dataset_enlarge_ratio: 20 # Enlarge because we only have 50 images

  val: # Re-enabled for you to see progress
    name: My_GT_Val
    type: PairedImageDataset
    dataroot_gt: /data1/hs_denoising/codeformer_dataset/codeformer_val/gt_overfit
    dataroot_lq: /data1/hs_denoising/codeformer_dataset/codeformer_val/gt_overfit
    io_backend:
      type: disk
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1
    
# network structures
network_g:
  type: VQAutoEncoder
  img_size: 512
  nf: 64
  ch_mult: [1, 2, 2, 4, 4, 8]
  quantizer: 'nearest'
  codebook_size: 1024

network_d:
  type: VQGANDiscriminator
  nc: 3
  ndf: 64

# path
path:
  # Load the official VQGAN as the starting point
  pretrain_network_g: ~ #./experiments/pretrained_models/vqgan_code1024.pth
  param_key_g: params_ema
  strict_load_g: true
  pretrain_network_d: ~
  resume_state: ~

# Training settings adjusted for 50 images
train:
  optim_g:
    type: Adam
    lr: !!float 1e-3 # Slower learning to protect identity
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-3
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [10000] 
    restart_weights: [1]
    eta_min: !!float 1e-7

  total_iter: 10000 # With 50 images, the "max ability" usually hits by 5k iterations

  warmup_iter: -1 
  ema_decay: 0.995 

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0 # High weight to keep pixel-perfect identity
    reduction: mean

  perceptual_opt:
    type: LPIPSLoss
    loss_weight: 1.0
    use_input_norm: true
    range_norm: true

  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: !!float 0.0 # Keep this low so the model doesn't hallucinate new details

  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 1000 # Start the "Critic" early
  manual_seed: 0

# validation settings
val:
  val_freq: 1000
  save_img: true

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: 1000
  use_tb_logger: true
# general settings
name: CodeFormer_stage3
model_type: CodeFormerIdxModel
num_gpu: 4 # Changed from 8 to match your hardware
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: Denoising dataset
    type: PairedImageDataset # Use the same type as stage 2 for your specific data
    dataroot_gt: /data1/hs_denoising/codeformer_dataset/codeformer_val/gt_overfit
    dataroot_lq: /data1/hs_denoising/codeformer_dataset/codeformer_val/lq_overfit
    filename_tmpl: '{}'
    io_backend:
      type: disk

    in_size: 512
    gt_size: 512
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    use_hflip: true
    use_corrupt: false # Set to false since you have paired data
    scale: 1
    use_flip: false
    use_rot: false

    # large degradation in stageII
    blur_kernel_size: 41
    use_motion_kernel: false
    motion_kernel_prob: 0.001
    kernel_list: ['iso', 'aniso']
    kernel_prob: [0.5, 0.5]
    blur_sigma: [1, 15]
    downsample_range: [4, 30]
    noise_range: [0, 20]
    jpeg_range: [30, 80]

    # data loader
    num_worker_per_gpu: 2
    batch_size_per_gpu: 2 # Reduced slightly for 4 GPUs to be safe
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: Denoising dataset Val
    type: PairedImageDataset
    dataroot_gt: /data1/hs_denoising/codeformer_dataset/codeformer_val/gt_overfit
    dataroot_lq: /data1/hs_denoising/codeformer_dataset/codeformer_val/lq_overfit
    io_backend:
      type: disk
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]
    scale: 1
    
# network structures
network_g:
  type: CodeFormer
  dim_embd: 512
  n_head: 8
  n_layers: 9
  codebook_size: 1024
  connect_list: ['32', '64', '128', '256']
  fix_modules: ['quantize','generator']

network_vqgan:
  type: VQAutoEncoder
  img_size: 512
  nf: 64
  ch_mult: [1, 2, 2, 4, 4, 8]
  quantizer: 'nearest'
  codebook_size: 1024

network_d:
  type: VQGANDiscriminator
  nc: 3
  ndf: 64
  n_layers: 4

# path
path:
  # Point this to your successful Stage 2 weights
  pretrain_network_g: ./experiments/20260311_180712_CodeFormer_stage2/models/net_g_7000.pth
  param_key_g: params_ema
  strict_load_g: false
  # You can use the official D or leave it ~ if starting fresh for D
  pretrain_network_d: ~ 
  resume_state: ~

train:
  use_hq_feat_loss: true
  feat_loss_weight: 1.0 # Higher weight to keep eye details sharp
  cross_entropy_loss: true
  entropy_loss_weight: 0.1
  scale_adaptive_gan_weight: 0.1
  scale: 1

  optim_g:
    type: Adam
    lr: !!float 1e-5 # Lowered from 5e-5 for safer fine-tuning
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [150000]
    restart_weights: [1]
    eta_min: !!float 1e-6

  total_iter: 15000
  warmup_iter: 20 # Added warmup to prevent GAN crash
  ema_decay: 0.997

  pixel_opt:
    type: L1Loss
    loss_weight: 5.0
    reduction: mean

  perceptual_opt:
    type: LPIPSLoss
    loss_weight: 1.0
    use_input_norm: true
    range_norm: true

  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: !!float 0.07

  use_adaptive_weight: true
  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 5 # Start Discriminator after warmup
  manual_seed: 0

# validation settings
val:
  val_freq: 1000
  save_img: true

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: 2000
  use_tb_logger: true

dist_params:
  backend: nccl
  port: 29413

find_unused_parameters: true